# ---- Rate limiting (bot protection) ----
# These must be defined at the `http` context level (outside `server {}`).
# Key by client IP. Tune rates as needed.
limit_req_zone $binary_remote_addr zone=rl_admin_login:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=rl_invite_verify:10m rate=30r/m;
# Socket.io can use polling bursts + websockets; keep this loose.
limit_req_zone $binary_remote_addr zone=rl_socketio:10m rate=120r/m;

server {
    listen 80;

    # Return 429 for rate-limited requests.
    limit_req_status 429;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Strict: admin login (3 req/min per IP)
    location = /api/admin/auth/login {
        # No burst: strictly enforce 3/min.
        limit_req zone=rl_admin_login burst=0 nodelay;
        proxy_pass http://backend:3000/api/admin/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Medium: invite/verify (30 req/min per IP)
    location = /api/auth/verify {
        limit_req zone=rl_invite_verify burst=10 nodelay;
        proxy_pass http://backend:3000/api/auth/verify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API Proxy
    location /api {
        proxy_pass http://backend:3000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io Proxy
    location /socket.io/ {
        limit_req zone=rl_socketio burst=120 nodelay;
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
