version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: alpaco_postgres
    environment:
      POSTGRES_USER: alpaco_user
      POSTGRES_PASSWORD: alpaco_password
      POSTGRES_DB: alpaco_exam_db
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for Session & Socket.io Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: alpaco_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "alpaco_redis_pass"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
