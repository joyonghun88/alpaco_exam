version: '3.8'

services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: alpaco_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=alpaco_user
      - POSTGRES_PASSWORD=alpaco_password
      - POSTGRES_DB=alpaco_exam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alpaco_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - PORT=3000
    depends_on:
      - redis
      - postgres

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alpaco_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # Redis for Socket.io & Cache
  redis:
    image: redis:7-alpine
    container_name: alpaco_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
