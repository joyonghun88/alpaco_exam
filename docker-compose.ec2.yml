version: '3.8'

# EC2/production compose:
# - Only frontend is published on the host (80). Backend/Postgres stay private in the Docker network.
# - Adds conservative json-file log limits.
# - Adds container memory limits (still consider host-level monitoring).
services:
  postgres:
    image: postgres:16-alpine
    container_name: alpaco_postgres
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER=alpaco_user
      - POSTGRES_PASSWORD=alpaco_password
      - POSTGRES_DB=alpaco_exam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alpaco_backend
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - aws.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - NODE_OPTIONS=--max-old-space-size=256
      - PORT=3000
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alpaco_frontend
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
    environment:
      - ADMIN_BASIC_AUTH_USER=${ADMIN_BASIC_AUTH_USER}
      - ADMIN_BASIC_AUTH_PASS=${ADMIN_BASIC_AUTH_PASS}
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: alpaco_redis
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  postgres_data:

